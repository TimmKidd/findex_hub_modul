# A generic, single database configuration.

[alembic]
# Path to migration scripts
script_location = %(here)s/alembic

# Ensure project root is on sys.path so "import findex_bot..." works in env.py
prepend_sys_path = .

# Use os.pathsep for path splitting
path_separator = os

# IMPORTANT:
# We DO NOT hardcode the DB URL here.
# env.py will read DATABASE_URL from environment/.env
sqlalchemy.url =

[post_write_hooks]
# Optional auto-formatting hooks for new revisions (disabled by default).
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
