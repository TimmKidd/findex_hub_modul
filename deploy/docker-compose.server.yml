services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}"

  bot:
    build:
      context: /Users/tmkd/Desktop/tmkd/FindexHub
      dockerfile: Dockerfile
    env_file:
      - ${APP_ENV_FILE}
    command: python -m findex_bot.bot
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, redis; url=os.getenv('REDIS_URL'); r=redis.Redis.from_url(url) if url else redis.Redis(host=os.getenv('REDIS_HOST','redis'), port=int(os.getenv('REDIS_PORT','6379')), password=os.getenv('REDIS_PASSWORD') or None); r.ping(); print('ok')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - postgres
      - redis

  jobs:
    restart: unless-stopped
    build:
      context: /Users/tmkd/Desktop/tmkd/FindexHub
      dockerfile: Dockerfile
    env_file:
      - ${APP_ENV_FILE}
    command: python -m findex_bot.jobs
    depends_on:
      - postgres
      - redis

  resurrection:
    restart: unless-stopped
    build:
      context: /Users/tmkd/Desktop/tmkd/FindexHub
      dockerfile: Dockerfile
    env_file:
      - ${APP_ENV_FILE}
    command: python -m findex_bot.resurrection_worker
    depends_on:
      - postgres
      - redis

  support:
    restart: unless-stopped
    build:
      context: /Users/tmkd/Desktop/tmkd/FindexHub
      dockerfile: Dockerfile
    env_file:
      - ${APP_ENV_FILE}
    command: python support_bot/support_bot.py
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
