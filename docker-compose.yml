services:
  postgres:
    image: postgres:16
    container_name: findex_pg
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-findex}
      POSTGRES_USER: ${POSTGRES_USER:-findex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "127.0.0.1:5433:5432"   # только localhost (безопасно для локалки/сервера)
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: findex_redis
    # ✅ прокидываем пароль внутрь контейнера, чтобы healthcheck/echo работали как ожидается
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    # В БАЗОВОМ compose портов НЕТ -> Redis не торчит наружу
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      # ✅ пароль берём из env контейнера
      test: ["CMD", "sh", "-lc", "redis-cli -a \"$$REDIS_PASSWORD\" PING | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    external: true
    name: cc1dca0b480393dc5de729397c59bf94b8b80a7e31feca4b5630336d092a3f58
  redisdata: